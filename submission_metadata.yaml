ai_tools_used:
  - "Claude"   # architecture, code review, guided development

ai_usage_summary: |
  Used Claude (claude.ai) for architectural guidance, code review, and
  step-by-step development discussion. All code written and understood
  by the participant. No candidate data was fed to any external LLM.
  The ranking logic, scoring weights, and JD requirements config are
  original design decisions made by the participant.

# ============================================================
# Approach summary
# ============================================================
methodology_summary: |
  Two-phase hybrid ranking system. Phase 1 (offline): sentence-transformer
  embeddings (all-MiniLM-L6-v2) pre-computed for all 100K candidates and
  saved as float16 numpy arrays. Structured features (title category,
  company type, location match, trajectory, skill counts) pre-computed
  as a parquet file. Phase 2 (online, <5 min CPU, no network): cosine
  similarity between pre-saved embeddings, combined with rule-based
  scores from jd_config.json, and a multiplicative behavioral signal
  modifier (recency, response rate, open_to_work, notice period).
  Honeypot detection via internal consistency checks. Per-candidate
  reasoning generated from actual profile facts, not templates.

# ============================================================
# Declarations
# ============================================================
declarations:
  read_submission_spec: true
